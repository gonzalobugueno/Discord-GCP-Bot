on:
  push:
    tags:
      - "v*"

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/discordgcpbot:${{ github.ref_name }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/discordgcpbot:latest \
            .

      - name: Push image
        run: |
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/discordgcpbot:${{ github.ref_name }}
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/discordgcpbot:latest